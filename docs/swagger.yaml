              schema:
                type: array
                items:
                  type: object
                  properties:
                    orderId:
                      type: integer
                    imageId:
                      type: integer
                    title:
                      type: string
                    thumbnailUrl:
                      type: string
                    price:
                      type: string
                    currency:
                      type: string
                    orderStatus:
                      type: string
                      enum: [PENDING_PAYMENT, PAID, FAILED]
                    txHash:
                      type: string
                    purchasedAt:
                      type: string
                      format: date-time
