          schema:
            type: integer
          example: 101
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId]
              properties:
                orderId:
                  type: integer
            example:
              orderId: 9002
      responses:
        200:
          description: 다운로드 URL 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloadUrl:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                  watermark:
                    type: object
                    properties:
                      applied:
                        type: boolean
                      text:
                        type: string
                      position:
                        type: string
                        enum: [top-left, top-right, bottom-left, bottom-right]
              example:
